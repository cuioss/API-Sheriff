# API Sheriff Application Configuration

# Application metadata
quarkus.application.name=api-sheriff

# HTTP/HTTPS Configuration
quarkus.http.port=8080
quarkus.http.ssl-port=8443
quarkus.http.insecure-requests=redirect

# Management interface — health/metrics on separate plain HTTP port
# Follows Keycloak pattern: application on 8443 (HTTPS), operations on 9000 (HTTP)
quarkus.management.enabled=true

# TLS Configuration
quarkus.ssl.native=true
quarkus.tls.protocols=TLSv1.3,TLSv1.2

# Accept-time TLS edge — SNI passthrough split (tls/SniFrontListener, tls/TlsEdgeProducer).
# The Vert.x front listener is started ONLY when gateway.yaml declares tls.passthrough_sni; when it
# is empty the front is never created and the terminated Quarkus HTTPS listener (quarkus.http.ssl-port
# above) keeps the public port — the default single-listener topology is unchanged (zero overhead).
# A deployment that enables tls.passthrough_sni gives the public TLS port to the front listener and
# moves the terminated Quarkus HTTPS listener to the internal loopback port by additionally setting
#   quarkus.http.ssl-port=${sheriff.tls.internal-https-port}
# so the front owns sheriff.tls.public-port and opaquely L4-relays a matched SNI to the resolved
# backend, handing every other connection to the internal terminated listener.
sheriff.tls.public-port=8443
sheriff.tls.internal-https-port=8444

# mTLS on terminated connections (tls/MtlsServerCustomizer). Client-auth is bound PROGRAMMATICALLY
# from gateway.yaml's tls.mtls block: when tls.mtls.enabled is set the terminated HTTPS listener is
# switched to require-and-verify a client certificate against the configured client_ca trust anchor
# (no HTTP fallback, no optional/want mode). This explicit default keeps client-auth OFF when
# tls.mtls is absent or disabled; passthrough connections are split off at L4 and never mTLS-checked.
quarkus.http.ssl.client-auth=none
quarkus.tls.cipher-suites=TLS_AES_256_GCM_SHA384,TLS_CHACHA20_POLY1305_SHA256,TLS_AES_128_GCM_SHA256,TLS_ECDHE_RSA_WITH_AES_256_GCM_SHA384,TLS_ECDHE_RSA_WITH_CHACHA20_POLY1305_SHA256
quarkus.tls.alpn=true

# Native Image Configuration
quarkus.native.additional-build-args=--enable-url-protocols=https,--enable-http,--enable-https,-O2
quarkus.native.resources.includes=**/*.p12,**/*.crt,**/*.key,schema/*.json
quarkus.native.monitoring=jfr
# Java 25 Mandrel builder image for JEP 491 (virtual threads without pinning) — see ADR-0001
quarkus.native.builder-image=quay.io/quarkus/ubi9-quarkus-mandrel-builder-image:jdk-25

# Virtual Threads Configuration
quarkus.virtual-threads.name-prefix=api-sheriff

# Configuration subsystem — the directory holding gateway.yaml, the endpoints/
# subdirectory, and topology.properties. Read once at startup by ConfigProducer,
# which validates the whole set and fails fast (non-zero exit) on any violation.
sheriff.config.dir=config

# Token-Sheriff validation issuer — integration-test profile only.
# The token-sheriff-validation-quarkus extension requires at least one enabled issuer,
# and its JWKS readiness check only reports UP once the issuer's key set has loaded.
# The shipped default profile configures no issuer (deployments supply their own).
# Under the "it" profile (QUARKUS_PROFILE=it, set by the integration-tests docker-compose)
# we use a static file JWKS: a file loader reaches OK synchronously at startup, so readiness
# is UP with no dependency on Keycloak reachability (the api-sheriff integration tests
# exercise gateway routing + health, not live token validation). The JWKS is mounted
# read-only into the container at /app/certificates/test-jwks.json; token-sheriff's
# jwks.file-path is a plain filesystem path (no classpath: support).
# Trust profile named by gateway.yaml's jwks.tls_profile — integration/benchmark profile only.
# gateway.yaml says only `tls_profile: benchmark-idp`; this is where that logical name is bound
# to concrete trust material, which is why no truststore path or password ever appears in the
# gateway document. The benchmark Keycloak serves a self-signed localhost certificate, so the
# JWKS client must trust the same store the rest of the stack already mounts — without it the
# fetch fails PKIX path building and every bearer request is rejected 401. Test-only material:
# the shipped default profile binds no such trust profile, and a deployment that names one
# supplies its own anchors.
%it.quarkus.tls.benchmark-idp.trust-store.p12.path=/app/certificates/localhost-truststore.p12
%it.quarkus.tls.benchmark-idp.trust-store.p12.password=localhost-trust

%it.sheriff.token.issuers.it-static.enabled=true
%it.sheriff.token.issuers.it-static.issuer-identifier=https://api-sheriff.test/it
%it.sheriff.token.issuers.it-static.jwks.file-path=/app/certificates/test-jwks.json
%it.sheriff.token.issuers.it-static.audience-validation-disabled=true
%it.sheriff.token.issuers.it-static.claim-sub-optional=true

# Logging
quarkus.log.level=INFO
quarkus.log.category."de.cuioss.sheriff".level=INFO

# File logging (enabled in Docker via LOG_FILE_PATH env var)
quarkus.log.file.enable=true
quarkus.log.file.path=${LOG_FILE_PATH:/quarkus.log}
quarkus.log.file.level=INFO
quarkus.log.file.format=%d{yyyy-MM-dd HH:mm:ss,SSS z} %-5p [%c{3.}] (%t) %s%e%n
quarkus.log.file.rotation.max-file-size=100M
quarkus.log.file.rotation.max-backup-index=5
%dev.quarkus.log.file.enable=false

# Development settings
quarkus.live-reload.instrumentation=false
