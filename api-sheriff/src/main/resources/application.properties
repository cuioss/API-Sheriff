# API Sheriff Application Configuration

# Application metadata
quarkus.application.name=api-sheriff

# HTTP/HTTPS Configuration
quarkus.http.port=8080
quarkus.http.ssl-port=8443
quarkus.http.insecure-requests=redirect

# Management interface — health/metrics on separate plain HTTP port
# Follows Keycloak pattern: application on 8443 (HTTPS), operations on 9000 (HTTP)
quarkus.management.enabled=true

# TLS Configuration
quarkus.ssl.native=true
quarkus.tls.protocols=TLSv1.3,TLSv1.2
quarkus.tls.cipher-suites=TLS_AES_256_GCM_SHA384,TLS_CHACHA20_POLY1305_SHA256,TLS_AES_128_GCM_SHA256,TLS_ECDHE_RSA_WITH_AES_256_GCM_SHA384,TLS_ECDHE_RSA_WITH_CHACHA20_POLY1305_SHA256
quarkus.tls.alpn=true

# Native Image Configuration
quarkus.native.additional-build-args=--enable-url-protocols=https,--enable-http,--enable-https,-O2
quarkus.native.resources.includes=**/*.p12,**/*.crt,**/*.key
quarkus.native.monitoring=jfr
# Java 25 Mandrel builder image for JEP 491 (virtual threads without pinning) — see ADR-0001
quarkus.native.builder-image=quay.io/quarkus/ubi9-quarkus-mandrel-builder-image:jdk-25

# Virtual Threads Configuration
quarkus.virtual-threads.name-prefix=api-sheriff

# Configuration subsystem — the directory holding gateway.yaml, the endpoints/
# subdirectory, and topology.properties. Read once at startup by ConfigProducer,
# which validates the whole set and fails fast (non-zero exit) on any violation.
sheriff.config.dir=config

# Logging
quarkus.log.level=INFO
quarkus.log.category."de.cuioss.sheriff".level=INFO

# File logging (enabled in Docker via LOG_FILE_PATH env var)
quarkus.log.file.enable=true
quarkus.log.file.path=${LOG_FILE_PATH:/quarkus.log}
quarkus.log.file.level=INFO
quarkus.log.file.format=%d{yyyy-MM-dd HH:mm:ss,SSS z} %-5p [%c{3.}] (%t) %s%e%n
quarkus.log.file.rotation.max-file-size=100M
quarkus.log.file.rotation.max-backup-index=5
%dev.quarkus.log.file.enable=false

# Development settings
quarkus.live-reload.instrumentation=false
