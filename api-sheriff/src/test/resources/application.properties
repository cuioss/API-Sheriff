# Test profile — use existing integration-test certificates for TLS
quarkus.tls.key-store.pem.0.cert=../integration-tests/src/main/docker/certificates/localhost.crt
quarkus.tls.key-store.pem.0.key=../integration-tests/src/main/docker/certificates/localhost.key
quarkus.management.enabled=false
quarkus.log.file.enable=false

# Proxy route under test — upstream is a MockWebServer started on this fixed port
# by ProxyRouteTest (Quarkus freezes config at boot, so a dynamic port cannot be used).
sheriff.proxy.path-prefix=/proxy
sheriff.proxy.upstream-url=http://localhost:19191
