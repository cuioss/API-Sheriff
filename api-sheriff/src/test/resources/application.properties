# Test profile — use existing integration-test certificates for TLS
quarkus.tls.key-store.pem.0.cert=../integration-tests/src/main/docker/certificates/localhost.crt
quarkus.tls.key-store.pem.0.key=../integration-tests/src/main/docker/certificates/localhost.key
quarkus.management.enabled=false
quarkus.log.file.enable=false

# Minimal valid boot config so ConfigProducer's fail-fast startup succeeds inside
# the full-container @QuarkusTest boot (see src/test/resources/config/testboot).
# The proxy edge under test sources its upstream from the RouteTable assembled from
# this directory (endpoints/proxy.yaml -> UPSTREAM topology alias), not from any
# static sheriff.proxy.* configuration.
sheriff.config.dir=target/test-classes/config/testboot
