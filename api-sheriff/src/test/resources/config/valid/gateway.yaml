version: 1
metadata:
  config_version: "2024-05-01"
tls:
  min_version: "1.3"
  alpn: ["h2", "http/1.1"]
security_headers:
  content_type_nosniff: true
  frame_deny: true
  hsts:
    max_age: 31536000
    include_subdomains: true
security_defaults:
  profile: "strict"
allowed_methods: ["GET", "POST", "PUT", "DELETE"]
upstream_defaults:
  retry:
    enabled: true
  not_modified:
    enabled: false
forwarded:
  trusted_proxies: ["10.0.0.0/8"]
  trust_scheme_host: true
  emit: "both"
token_validation:
  issuers:
    - name: "primary"
      issuer: "https://issuer.example.com"
      audience: "api-sheriff"
      jwks:
        source: "http"
        url: "https://issuer.example.com/jwks"
oidc:
  issuer: "https://issuer.example.com"
  client_id: "sheriff"
  client_secret: "${OIDC_CLIENT_SECRET}"
  scopes: ["openid", "profile"]
  redirect_uri: "https://gw.example.com/callback"
