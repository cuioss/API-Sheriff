# API Sheriff Integration Tests - Production-Grade Configuration
# Purpose: Test with production-equivalent settings to catch issues early

services:
  keycloak:
    # NOTE: Dependabot cannot automatically update this image version.
    # Manual updates required. Check: https://quay.io/keycloak/keycloak
    image: quay.io/keycloak/keycloak:26.2.5
    command:
      - start-dev
      - --import-realm
      - --https-certificate-file=/opt/keycloak/certificates/localhost.crt
      - --https-certificate-key-file=/opt/keycloak/certificates/localhost.key
      - --https-port=8443
    ports:
      - "1443:8443"  # External HTTPS port for Keycloak admin
      - "1090:9000"  # External port for Keycloak management (health checks)
    volumes:
      - ./src/main/docker/keycloak:/opt/keycloak/data/import:ro
      - ./src/main/docker/certificates:/opt/keycloak/certificates:ro
    environment:
      - KC_BOOTSTRAP_ADMIN_USERNAME=admin
      - KC_BOOTSTRAP_ADMIN_PASSWORD=admin
      - KC_HEALTH_ENABLED=true
      - KC_METRICS_ENABLED=true
      - KC_LOG_LEVEL=INFO
      # Hostname configuration v2 for well-known discovery endpoint (research-based)
      - KC_HOSTNAME_STRICT=false
      - KC_HTTP_ENABLED=false
      - KC_HTTPS_PORT=8443
      - KC_HOSTNAME=localhost
      # External hostname for Docker container well-known discovery
    networks:
      - jwt-integration

  api-sheriff:
    # Production Dockerfiles from api-sheriff module — test instrumentation at compose level
    # For distroless: DOCKERFILE=Dockerfile.native DOCKER_IMAGE_TAG=distroless (default)
    # For JFR:        DOCKERFILE=Dockerfile.native.jfr DOCKER_IMAGE_TAG=jfr
    image: "api-sheriff:${DOCKER_IMAGE_TAG:-distroless}"
    build:
      context: ../api-sheriff
      dockerfile: src/main/docker/${DOCKERFILE:-Dockerfile.native}
      cache_from:
        - quay.io/quarkus/quarkus-distroless-image:2.0
        - quay.io/quarkus/ubi9-quarkus-micro-image:2.0

    ports:
      - "10443:8443"  # External test port for integration tests

    # Test-specific TLS truststore flags (not baked into production image)
    command:
      - "-Djavax.net.ssl.trustStore=/app/certificates/localhost-truststore.p12"
      - "-Djavax.net.ssl.trustStorePassword=localhost-trust"
      - "-Djavax.net.ssl.trustStoreType=PKCS12"
      - "-Djdk.tls.rejectClientInitiatedRenegotiation=true"
      - "-Djavax.net.ssl.sessionCacheSize=20480"

    environment:
      - QUARKUS_LOG_LEVEL=INFO
      # File logging to mounted target directory
      - LOG_FILE_PATH=/logs/quarkus.log
      # Certificate paths (runtime override)
      - QUARKUS_HTTP_SSL_CERTIFICATE_FILES=/app/certificates/localhost.crt
      - QUARKUS_HTTP_SSL_CERTIFICATE_KEY_FILES=/app/certificates/localhost.key
      - QUARKUS_TLS_DEFAULT_TRUST__STORE_P12_PATH=/app/certificates/localhost-truststore.p12
      - QUARKUS_TLS_DEFAULT_TRUST__STORE_P12_PASSWORD=localhost-trust
      # JWT Issuer Configuration — default issuer (static key, disabled for Docker tests)
      - API_SHERIFF_ISSUERS_DEFAULT_ISSUER__IDENTIFIER=https://test-auth.example.com
      - API_SHERIFF_ISSUERS_DEFAULT_ENABLED=false
      - API_SHERIFF_ISSUERS_DEFAULT_JWKS_FILE__PATH=classpath:test-jwks.json
      # JWT Issuer Configuration — Keycloak issuer (well-known discovery)
      - API_SHERIFF_ISSUERS_KEYCLOAK_ENABLED=true
      - API_SHERIFF_ISSUERS_KEYCLOAK_ISSUER__IDENTIFIER=https://keycloak:8443/realms/benchmark
      - API_SHERIFF_ISSUERS_KEYCLOAK_JWKS_HTTP_WELL__KNOWN__URL=https://keycloak:8443/realms/benchmark/.well-known/openid-configuration
      - API_SHERIFF_ISSUERS_KEYCLOAK_EXPECTED__CLIENT__ID=benchmark-client
      - API_SHERIFF_ISSUERS_KEYCLOAK_KEYCLOAK_MAPPERS_DEFAULT__ROLES_ENABLED=false
      - API_SHERIFF_ISSUERS_KEYCLOAK_KEYCLOAK_MAPPERS_DEFAULT__GROUPS_ENABLED=false
      - API_SHERIFF_ISSUERS_KEYCLOAK_CLAIM__SUB__OPTIONAL=true
      # JWT Issuer Configuration — Integration issuer (direct JWKS URL)
      - API_SHERIFF_ISSUERS_INTEGRATION_ENABLED=true
      - API_SHERIFF_ISSUERS_INTEGRATION_ISSUER__IDENTIFIER=https://keycloak:8443/realms/integration
      - API_SHERIFF_ISSUERS_INTEGRATION_JWKS_HTTP_URL=https://keycloak:8443/realms/integration/protocol/openid-connect/certs
      - API_SHERIFF_ISSUERS_INTEGRATION_EXPECTED__CLIENT__ID=integration-client
      - API_SHERIFF_ISSUERS_INTEGRATION_KEYCLOAK_MAPPERS_DEFAULT__ROLES_ENABLED=false
      - API_SHERIFF_ISSUERS_INTEGRATION_KEYCLOAK_MAPPERS_DEFAULT__GROUPS_ENABLED=false
      - API_SHERIFF_ISSUERS_INTEGRATION_CLAIM__SUB__OPTIONAL=false
      # Health check overrides for testing
      - API_SHERIFF_HEALTH_JWKS_CACHE__SECONDS=30
      - API_SHERIFF_HEALTH_JWKS_TIMEOUT__SECONDS=5
      # Test overrides — faster metrics, no caching
      - API_SHERIFF_METRICS_COLLECTION_INTERVAL=2s
      - API_SHERIFF_CACHE_ACCESS__TOKEN_MAX__SIZE=0
      - API_SHERIFF_CACHE_ACCESS__TOKEN_EVICTION__INTERVAL__SECONDS=10

    depends_on:
      - keycloak

    volumes:
      # Read-only certificate mount (production pattern)
      - ./src/main/docker/certificates:/app/certificates:ro
      # Mount target directory for log files (defaults to ./target)
      - ${LOG_TARGET_DIR:-./target}:/logs:rw
      # JFR output volume for profiling recordings
      - ./target/jfr-recordings:/tmp/jfr-output:rw

    # OWASP Security hardening (production-grade)
    security_opt:
      - no-new-privileges:true

    # Drop all capabilities (principle of least privilege)
    cap_drop:
      - ALL

    # Read-only filesystem with tmpfs for temporary files (production setting)
    read_only: true
    tmpfs:
      - /tmp:rw,noexec,nosuid,size=100m

    # Resource limitations (DoS protection - production values)
    deploy:
      resources:
        limits:
          memory: 512M
          cpus: '4.0'
        reservations:
          memory: 256M
          cpus: '1.0'

    # Health check: startup script handles readiness via external curl probe
    # No Docker HEALTHCHECK — distroless has no shell; JFR variant has its own

    # Network isolation (production pattern)
    networks:
      - jwt-integration

    # Production restart policy
    restart: unless-stopped

networks:
  jwt-integration:
    driver: bridge
    # Control inter-container communication (production setting)
    internal: false
    driver_opts:
      com.docker.network.bridge.enable_icc: "true"
      com.docker.network.bridge.enable_ip_masquerade: "true"
      com.docker.network.driver.mtu: "1500"
