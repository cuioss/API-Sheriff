<?xml version="1.0" encoding="UTF-8"?>
<!--
  Request pipeline — inbound request flowing left-to-right through the gateway stages.
  theme-handling: A (theme-neutral)
  see  pm-documents:ref-svg-diagrams/standards/diagram-type-flow.md
-->
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1160 340"
     role="img" aria-labelledby="title desc"
     font-family="ui-sans-serif, -apple-system, system-ui, 'Segoe UI', sans-serif">
  <title id="title">API Sheriff inbound request pipeline</title>
  <desc id="desc">A left-to-right flow: an inbound request passes through the TLS edge, the cui-http security filter, static route matching, authentication, and the zero-trust forward policy before reaching the upstream service. The event system and metrics observe every stage. A request failing any stage is rejected before it reaches the upstream.</desc>

  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5"
            markerWidth="9" markerHeight="9" orient="auto">
      <path d="M0,0 L10,5 L0,10 z" class="arrow-fill"/>
    </marker>
    <style>
      .stage      { font-size: 13px; font-weight: 600; fill: #6e7681; text-anchor: middle; }
      .sub        { font-size: 11px; fill: #6e7681; text-anchor: middle; font-style: italic; }
      .note       { font-size: 11px; fill: #6e7681; text-anchor: middle; font-style: italic; }
      .stroke     { stroke: #6e7681; stroke-width: 1.2; fill: none; }
      .track      { stroke: #6e7681; stroke-width: 1.5; fill: none; }
      .arrow-fill { fill: #6e7681; }
      .dash       { stroke: #6e7681; stroke-width: 0.6; stroke-dasharray: 3 3; fill: none; }
      .caption    { font-size: 12px; fill: #6e7681; text-anchor: middle; font-style: italic; }
    </style>
  </defs>

  <!-- top annotation -->
  <text x="580" y="34" class="note">Immutable configuration, validated at startup</text>

  <!-- track line (passes through the stage boxes) -->
  <circle cx="44" cy="160" r="4" class="stroke"/>
  <line class="track" x1="44" y1="160" x2="1020" y2="160" marker-end="url(#arrow)"/>

  <!-- stage boxes (height 64, centred on y=160) -->
  <rect class="stroke" x="75"  y="128" width="150" height="64" rx="6"/>
  <rect class="stroke" x="270" y="128" width="150" height="64" rx="6"/>
  <rect class="stroke" x="465" y="128" width="150" height="64" rx="6"/>
  <rect class="stroke" x="660" y="128" width="150" height="64" rx="6"/>
  <rect class="stroke" x="855" y="128" width="150" height="64" rx="6"/>
  <!-- terminal upstream node -->
  <rect class="stroke" x="1025" y="126" width="120" height="68" rx="6"/>

  <!-- stage labels (above) -->
  <text x="150" y="116" class="stage">TLS edge</text>
  <text x="345" y="116" class="stage">Security filter</text>
  <text x="540" y="116" class="stage">Route match</text>
  <text x="735" y="116" class="stage">Authenticate</text>
  <text x="930" y="116" class="stage">Forward policy</text>

  <!-- stage sub-detail (below) -->
  <text x="150" y="214" class="sub">terminate / passthrough</text>
  <text x="345" y="214" class="sub">cui-http pipelines</text>
  <text x="540" y="214" class="sub">static table</text>
  <text x="735" y="214" class="sub">bearer / session</text>
  <text x="930" y="214" class="sub">zero-trust allowlist</text>

  <!-- upstream node inner labels -->
  <text x="1085" y="156" class="stage">Upstream</text>
  <text x="1085" y="176" class="sub">service</text>

  <!-- cross-cutting observability band -->
  <line class="dash" x1="75" y1="262" x2="1005" y2="262"/>
  <text x="540" y="284" class="note">Event system  &#8594;  metrics: paths, errors, average timing (Prometheus)</text>

  <!-- footer caption -->
  <text x="580" y="322" class="caption">Happy path, left to right. A request failing filtering, routing, or auth is rejected (deny-by-default) &#8212; nothing reaches the upstream.</text>
</svg>
