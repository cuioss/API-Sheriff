# yaml-language-server: $schema=../../../../../api-sheriff/src/main/resources/schema/gateway.schema.json
# Global gateway document mounted into the api-sheriff container at
# /app/sheriff-config (SHERIFF_CONFIG_DIR). The proxy integration suite exercises
# the single httpbin endpoint's /proxy route under the 'api' anchor; the disjoint
# 'bff' anchor demonstrates the two-anchor namespace model (ADR-0007). Anchor
# materialization is behaviour-neutral for this conforming config, so the existing
# routed-request IT keeps passing.
#
# Every anchor carries the two mandatory classification axes (ADR-0013): `type`
# (proxy | bff | asset) and `access` (public | authenticated), boot-validated by the
# fail-closed access->auth matrix. A `public` anchor declares NO auth block (public is
# the absence of auth), so the require: none postures that previously lived on the
# public anchors now live on their endpoints; the `authenticated` anchors keep their
# non-none auth floor. The two `asset` anchors (ADR-0014) serve static content through
# the gateway-owned response envelope: `assets-public` (public directory + upstream
# sources) and `assets-secure` (authenticated directory source, bearer-gated).
version: 1
metadata:
  config_version: "integration-test"
allowed_methods: ["GET", "POST", "PUT", "DELETE"]
tls:
  # ALPN advertises h2 alongside http/1.1 so the http2 benchmark aspect negotiates
  # HTTP/2 at the edge instead of silently falling back to HTTP/1.1 — a fallback
  # would report an h2 number that was never measured over h2.
  alpn: ["h2", "http/1.1"]
anchors:
  api:
    path_prefix: /proxy
    type: proxy
    access: public
  bff:
    path_prefix: /bff
    type: proxy
    access: public
  # Bearer-protected namespace exercised by BearerValidationIT. The gateway's own
  # token_validation issuer loads its key set from the mounted static JWKS file
  # (no Keycloak dependency), so the validator is ready offline at boot. The IT
  # only drives rejection scenarios (missing / malformed token -> 401), which never
  # reach the upstream — proving upstream count = 0 on every bearer rejection.
  secure:
    path_prefix: /secure
    type: proxy
    access: authenticated
    auth:
      require: bearer
  # --- Benchmark aspect namespaces (plan 04b) -------------------------------
  # These give the k6 aspect matrix an API Sheriff side to measure, so the
  # on-demand APISIX comparison has a route-for-route counterpart.
  graphql:
    path_prefix: /graphql
    type: proxy
    access: public
    allowed_methods: ["POST"]
  upload:
    path_prefix: /upload
    type: proxy
    access: public
    allowed_methods: ["POST"]
    security_filter:
      # 64 MiB — above the 50 MB upload aspect so the large-body run is MEASURED
      # rather than rejected at the edge. A rejection path is faster than a
      # transfer path, so an under-sized cap would report flatteringly good
      # numbers instead of failing. APISIX mirrors this same limit.
      max_body_bytes: 67108864
  # Pre-provisioned declarations only — no behaviour is implemented here. The
  # request pipeline still boot-rejects the ws/grpc protocols; roadmap plan 05
  # owns that behaviour and slots it in without re-touching this topology.
  ws:
    path_prefix: /ws
    type: proxy
    access: public
  grpc:
    path_prefix: /grpc
    type: proxy
    access: public
  # --- Asset terminal-action namespaces (ADR-0014) --------------------------
  # A public asset surface serving static content two ways: a directory source
  # backed by the read-only /app/assets volume mount, and an upstream source
  # backed by the secondary 'asset-origin' static server (topology alias
  # ASSET_ORIGIN). Only GET/HEAD are served; the gateway-owned response envelope
  # sets the content type from the file extension, adds X-Content-Type-Options:
  # nosniff, and strips any upstream Set-Cookie.
  assets-public:
    path_prefix: /assets
    type: asset
    access: public
    allowed_methods: ["GET", "HEAD"]
  # A bearer-gated asset surface (directory source). access: authenticated forces
  # the envelope to Cache-Control: no-store and, crucially, enforces auth BEFORE the
  # source is resolved — an unauthenticated request is rejected 401 and never reads
  # a file (auth-before-source, ADR-0014). The bearer floor reuses the same offline
  # token_validation issuers the 'secure' anchor relies on.
  assets-secure:
    path_prefix: /secure-assets
    type: asset
    access: authenticated
    allowed_methods: ["GET", "HEAD"]
    auth:
      require: bearer
token_validation:
  issuers:
    # Retained: BearerValidationIT's rejection scenarios resolve against this
    # offline static-JWKS issuer, which needs no Keycloak at boot.
    - name: it-static
      issuer: https://api-sheriff.test/it
      jwks:
        source: file
        file: /app/certificates/test-jwks.json
    # The bearer benchmark aspect mints its token from the Keycloak 'benchmark'
    # realm. That realm's import pins frontendUrl https://keycloak:8443, so a
    # minted token carries iss https://keycloak:8443/realms/benchmark regardless
    # of the host-published 1443 mint port — the issuer value below MUST be that
    # container-internal URL, not the host-published one, or every bearer request
    # is rejected 401 and the aspect measures the rejection path while reporting
    # it as bearer-validation throughput. JWKS is fetched over the shared
    # api-sheriff network, where 'keycloak' resolves by service name.
    - name: benchmark-keycloak
      issuer: https://keycloak:8443/realms/benchmark
      jwks:
        source: http
        url: https://keycloak:8443/realms/benchmark/protocol/openid-connect/certs
        # token-sheriff's SSRF egress guard refuses a JWKS URL that resolves to a
        # private address. 'keycloak' is a compose service name resolving to the
        # bridge network's site-local 172.x address, so without this entry the key
        # set never loads and every bearer request fails — the aspect would then
        # measure a rejection path while reporting it as bearer throughput. The
        # allowlist is host-exact (no wildcard) and names only this one trusted,
        # benchmark-local IdP: exactly the narrow widening GW-05 / BFF-07 permit.
        # The 'it-static' issuer above is deliberately NOT widened — it loads from
        # a mounted file and needs no egress at all.
        allowed_egress_hosts: ["keycloak"]
        # Keycloak serves a self-signed certificate here, so the JWKS client must verify it
        # against the stack's own trust anchors rather than the JVM default store — otherwise
        # the fetch fails PKIX path building and every bearer request is rejected 401, which
        # would again measure a rejection path while reporting it as bearer throughput. This
        # names a trust profile; it deliberately carries no store path and no password, so this
        # document stays portable and secret-free. The deployment binds the name.
        tls_profile: benchmark-idp
