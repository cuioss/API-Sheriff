# Topology aliases for the mounted integration configuration.
#
# UPSTREAM is the go-httpbin echo backend, reached by the gateway on the internal
# compose network. Its /anything/* endpoint echoes the received request as JSON so
# the proxy ITs can assert exactly what was forwarded. The benchmark overlay
# overrides this at runtime with TOPOLOGY_UPSTREAM=http://nginx-static:8080.
UPSTREAM=http://go-httpbin:8080/anything

# ASSET_ORIGIN is the secondary static server ('asset-origin', nginx) that backs the
# source: upstream asset route (/assets/cdn). The gateway fetches confined assets from
# it over the fixed-topology, SSRF-controlled egress and re-serves them under the
# gateway-owned response envelope. Reached on the internal compose network by service
# name; it publishes no host port.
ASSET_ORIGIN=http://asset-origin:80

# WS_UPSTREAM is the go-httpbin WebSocket echo endpoint, reached by the gateway on the
# internal compose network. go-httpbin serves a bidirectional echo at /websocket/echo, so
# every WebSocket integration-test route relays to this one upstream path — the alias carries
# the full /websocket/echo base path and each WS route's match prefix maps to the empty
# remainder, so the relay dials ws://go-httpbin:8080/websocket/echo. WebSocketProxyIT exercises
# the opaque relay (echo round-trip, Origin gate, idle reclaim) against it.
WS_UPSTREAM=http://go-httpbin:8080/websocket/echo

# GRPC_ECHO is the in-repo Quarkus gRPC echo upstream (grpc-echo:9000, plaintext h2c —
# the gateway's forced-h2 client speaks prior-knowledge h2c to the http-scheme target). The
# alias carries no base path: each gRPC route strips only its own /grpc/<aspect> match prefix,
# so the full gRPC method path (/{package}.Echo/{Method}) is preserved end-to-end to the
# upstream. GrpcProxyIT relays unary / server-streaming / failing calls through the gateway
# against it.
GRPC_ECHO=http://grpc-echo:9000
