# Topology aliases for the mounted integration configuration.
#
# UPSTREAM is the go-httpbin echo backend, reached by the gateway on the internal
# compose network. Its /anything/* endpoint echoes the received request as JSON so
# the proxy ITs can assert exactly what was forwarded. The benchmark overlay
# overrides this at runtime with TOPOLOGY_UPSTREAM=http://nginx-static:8080.
UPSTREAM=http://go-httpbin:8080/anything
