# yaml-language-server: $schema=../../../../../../api-sheriff/src/main/resources/schema/endpoint.schema.json
# The single proxied endpoint the integration suite exercises. Its /proxy route
# is the only route in the assembled RouteTable, so a request that echoes proves
# the gateway sourced its upstream from this mounted configuration (not from a
# removed static ProxyConfiguration). The UPSTREAM topology alias resolves to the
# go-httpbin echo backend (topology.properties), overridable per environment by an
# in-file ${VAR} placeholder (the benchmark overlay repoints it at nginx-static).
# The endpoint is anchored to the 'api' namespace (/proxy); it declares no auth
# block of its own and inherits the anchor's require: none posture (ADR-0007).
endpoint:
  id: httpbin
  enabled: true
  base_url: UPSTREAM
  anchor: api
  routes:
    - id: httpbin-proxy
      match:
        path_prefix: /proxy
      # The new pipeline edge (stage 5) forwards deny-by-default: only allow-listed
      # request headers and query parameters cross to the upstream. Allow the header
      # and query names the proxy suite exercises so go-httpbin echoes them back —
      # Content-Type so a text body is echoed as-is (not a base64 octet-stream
      # data-URI), and the probe/page/size/req query params the GET/metrics/shutdown
      # suites assert on.
      forward:
        headers_allow: ["Content-Type"]
        query_allow: ["probe", "page", "size", "req"]
