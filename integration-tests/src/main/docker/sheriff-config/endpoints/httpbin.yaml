# yaml-language-server: $schema=../../../../../../api-sheriff/src/main/resources/schema/endpoint.schema.json
# The single proxied endpoint the integration suite exercises. Its /proxy route
# is the only route in the assembled RouteTable, so a request that echoes proves
# the gateway sourced its upstream from this mounted configuration (not from a
# removed static ProxyConfiguration). The UPSTREAM topology alias resolves to the
# go-httpbin echo backend (topology.properties), overridable per environment by an
# in-file ${VAR} placeholder (the benchmark overlay repoints it at nginx-static).
# The endpoint is anchored to the 'api' namespace (/proxy). Its anchors (api,
# graphql, upload) are now access: public and therefore carry no auth block
# (ADR-0013 forbids an auth block on a public anchor), so the endpoint declares the
# require: none posture itself — inherited wholesale by every route, including the
# routes that override the default anchor to graphql/upload (endpoint auth wins over
# anchor auth in the resolution chain).
endpoint:
  id: httpbin
  enabled: true
  base_url: UPSTREAM
  anchor: api
  auth:
    require: none
  routes:
    - id: httpbin-proxy
      match:
        path_prefix: /proxy
      # The new pipeline edge (stage 5) forwards deny-by-default: only allow-listed
      # request headers and query parameters cross to the upstream. Allow the header
      # and query names the proxy suite exercises so go-httpbin echoes them back —
      # Content-Type so a text body is echoed as-is (not a base64 octet-stream
      # data-URI), and the probe/page/size/req query params the GET/metrics/shutdown
      # suites assert on.
      forward:
        headers_allow: ["Content-Type"]
        query_allow: ["probe", "page", "size", "req"]

    # --- Benchmark aspect routes (plan 04b) ---------------------------------
    # go-httpbin's /anything/* echo endpoint accepts POST bodies, so the graphql
    # and upload aspects need no new upstream service. Each route overrides the
    # endpoint's default 'api' anchor to join its own benchmark namespace.
    # Content-Type is allow-listed on every POST route because the forward stage
    # is deny-by-default — without it the body would not be echoed as sent.
    - id: httpbin-graphql
      protocol: graphql
      anchor: graphql
      match:
        path_prefix: /graphql
        methods: ["POST"]
      upstream:
        path: /anything/graphql
      forward:
        headers_allow: ["Content-Type"]

    # The two upload routes are separate so each aspect is independently
    # addressable; both ride the 'upload' anchor's raised body cap.
    - id: httpbin-upload-small
      anchor: upload
      match:
        path_prefix: /upload/small
        methods: ["POST"]
      upstream:
        path: /anything/upload-small
      forward:
        headers_allow: ["Content-Type"]

    - id: httpbin-upload-large
      anchor: upload
      match:
        path_prefix: /upload/large
        methods: ["POST"]
      upstream:
        path: /anything/upload-large
      forward:
        headers_allow: ["Content-Type"]
