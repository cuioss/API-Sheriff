# Runs integration/E2E tests via Maven with report deployment to cuioss.github.io.
name: Integration Tests

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  integration-tests:
    uses: cuioss/cuioss-organization/.github/workflows/reusable-maven-integration-tests.yml@0af17b4211b2db37c3bc9b5f316f0c534c3ee8d5 # v0.6.8
    with:
      report-name: integration-tests
      maven-args-input: |
        verify -Pintegration-tests -pl integration-tests -am
      reports-folder: |
        integration-tests/target/failsafe-reports
    secrets:
      RELEASE_APP_ID: ${{ secrets.RELEASE_APP_ID }}
      RELEASE_APP_PRIVATE_KEY: ${{ secrets.RELEASE_APP_PRIVATE_KEY }}
