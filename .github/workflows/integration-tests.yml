# Runs integration/E2E tests via Maven with report deployment to cuioss.github.io.
name: Integration Tests

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  merge_group:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  integration-tests:
    uses: cuioss/cuioss-organization/.github/workflows/reusable-maven-integration-tests.yml@ef13a4cc2866081c878187fdc3243243644bb19e # v0.10.1
    with:
      report-name: integration-tests
      maven-args-input: |
        verify -Pintegration-tests -pl integration-tests -am
      reports-folder: |
        integration-tests/target/failsafe-reports
    secrets:
      RELEASE_APP_ID: ${{ secrets.RELEASE_APP_ID }}
      RELEASE_APP_PRIVATE_KEY: ${{ secrets.RELEASE_APP_PRIVATE_KEY }}
