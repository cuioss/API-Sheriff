# Runs integration/E2E tests via Maven with report deployment to cuioss.github.io.
name: Integration Tests

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  integration-tests:
    uses: cuioss/cuioss-organization/.github/workflows/reusable-maven-integration-tests.yml@181cc6a24d4c2b6fe7378b9ac94ac3df4665de7b # v0.7.0
    with:
      report-name: integration-tests
      maven-args-input: |
        verify -Pintegration-tests -pl integration-tests -am
      reports-folder: |
        integration-tests/target/failsafe-reports
    secrets:
      RELEASE_APP_ID: ${{ secrets.RELEASE_APP_ID }}
      RELEASE_APP_PRIVATE_KEY: ${{ secrets.RELEASE_APP_PRIVATE_KEY }}
