name: Claude Code

on:
  issue_comment:
    types: [created]
  pull_request_review_comment:
    types: [created]
  issues:
    types: [opened, assigned]
  pull_request_review:
    types: [submitted]

# Declare default permissions as read only (principle of least privilege)
permissions:
  contents: read

jobs:
  claude:
    if: |
      (github.event_name == 'issue_comment' && contains(github.event.comment.body, '@claude')) ||
      (github.event_name == 'pull_request_review_comment' && contains(github.event.comment.body, '@claude')) ||
      (github.event_name == 'pull_request_review' && contains(github.event.review.body, '@claude')) ||
      (github.event_name == 'issues' && (contains(github.event.issue.body, '@claude') || contains(github.event.issue.title, '@claude')))
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: read
      issues: read
      id-token: write
      actions: read # Required for Claude to read CI results on PRs
    steps:
      - name: Checkout repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          fetch-depth: 1
      - name: Set up JDK 21
        uses: actions/setup-java@be666c2fcd27ec809703dec50e508c2fdc7f6654 # v5.2.0
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: maven
      - name: Run Claude Code
        id: claude
        uses: anthropics/claude-code-action@220272d38887a1caed373da96a9ffdb0919c26cc # beta
        with:
          claude_code_oauth_token: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}

          # This is an optional setting that allows Claude to read CI results on PRs
          additional_permissions: |
            actions: read

          allowed_tools: "Bash(./mvnw*),Bash(./mvnw -Ppre-commit clean verify -DskipTests),Bash(./mvnw clean verify),Bash(./mvnw clean install),Bash(./mvnw -Ppre-commit clean verify -DskipTests -pl bom),Bash(./mvnw -Ppre-commit clean verify -DskipTests -pl api-sheriff-library),Bash(./mvnw -Ppre-commit clean verify -DskipTests -pl api-sheriff-quarkus-parent),Bash(./mvnw -Ppre-commit clean verify -DskipTests -pl api-sheriff-quarkus-parent/api-sheriff-quarkus),Bash(./mvnw -Ppre-commit clean verify -DskipTests -pl api-sheriff-quarkus-parent/api-sheriff-quarkus-deployment),Bash(./mvnw -Ppre-commit clean verify -DskipTests -pl api-sheriff-quarkus-parent/api-sheriff-quarkus-integration-tests),Bash(./mvnw -Ppre-commit clean verify -DskipTests -pl benchmarking),Bash(./mvnw -Ppre-commit clean verify -DskipTests -pl benchmarking/benchmark-integration-wrk),Bash(./mvnw clean install -pl bom),Bash(./mvnw clean install -pl api-sheriff-library),Bash(./mvnw clean install -pl api-sheriff-quarkus-parent),Bash(./mvnw clean install -pl api-sheriff-quarkus-parent/api-sheriff-quarkus),Bash(./mvnw clean install -pl api-sheriff-quarkus-parent/api-sheriff-quarkus-deployment),Bash(./mvnw clean install -pl api-sheriff-quarkus-parent/api-sheriff-quarkus-integration-tests),Bash(./mvnw clean install -pl benchmarking),Bash(./mvnw clean install -pl benchmarking/benchmark-integration-wrk),Bash(git*),Bash(find*),Bash(gh*),Bash(java*)"
