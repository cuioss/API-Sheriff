# ============================================================================
# ONE-SHOT, TRANSIENT WORKFLOW — DELETE THIS FILE AFTER IT HAS BEEN RUN ONCE.
#
# Purpose: publish the relocation-only stubs at 1.0.1 for the abandoned
# de.cuioss.sheriff.api coordinates, so anything still resolving them is
# redirected to de.cuioss.sheriff.gateway. The stubs carry no code.
#
# It exists on the default branch ONLY because workflow_dispatch cannot be
# invoked for a workflow that is not on the default branch. It builds from the
# dedicated release/relocation-stubs branch, which is never merged.
#
# This workflow MUST NEVER carry an automated trigger. The 2026-07-12 accidental
# release of de.cuioss.sheriff.api:*:1.0.0 was caused by an event-driven trigger
# on a release workflow; that is the incident this stub publication cleans up
# after. workflow_dispatch is the only acceptable trigger here.
#
# Removal is tracked as the closing step of the coordinate relocation work.
# ============================================================================
name: Release Relocation Stubs (one-shot)

on:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  publish-relocation-stubs:
    name: Publish 1.0.1 relocation stubs to Maven Central
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Harden the runner (Audit all outbound calls)
        uses: step-security/harden-runner@a90bcbc6539c36a85cdfeb73f7e2f433735f215b # v2.15.0
        with:
          egress-policy: audit

      # Explicit ref: the stubs live on a dedicated branch that is never merged,
      # so this must not build whatever the dispatch ref happens to be.
      - name: Checkout the relocation-stubs branch
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          ref: release/relocation-stubs
          persist-credentials: false

      - name: Set up JDK 25 with Central credentials and the signing key
        uses: actions/setup-java@be666c2fcd27ec809703dec50e508c2fdc7f6654 # v5.2.0
        with:
          java-version: '25'
          distribution: 'temurin'
          cache: maven
          server-id: central
          server-username: MAVEN_USERNAME
          server-password: MAVEN_PASSWORD
          gpg-private-key: ${{ secrets.GPG_PRIVATE_KEY }}
          gpg-passphrase: MAVEN_GPG_PASSPHRASE

      - name: Deploy relocation stubs
        run: ./mvnw --no-transfer-progress --batch-mode -Prelease -f relocation-stubs/pom.xml deploy
        env:
          MAVEN_USERNAME: ${{ secrets.OSS_SONATYPE_USERNAME }}
          MAVEN_PASSWORD: ${{ secrets.OSS_SONATYPE_PASSWORD }}
          MAVEN_GPG_PASSPHRASE: ${{ secrets.GPG_PASSPHRASE }}
